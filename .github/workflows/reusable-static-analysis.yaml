name: "Reusable Static Analysis"

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        default: "."
        type: string
    secrets:
      GH_PAT:
        required: true

permissions:
  contents: read

jobs:
  validate:
    name: "Tfctl Doctor & Security"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Consumer Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout Central Policies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rhyscraig/aws-terraform-platform-aws-workflows
          path: _central_policies
          sparse-checkout: |
            policies
          token: ${{ secrets.GH_PAT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Tfctl
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pip install --upgrade pip
          pip install "git+https://${GH_TOKEN}@github.com/rhyscraig/tfctl.git@v2.2.0"

      - name: Run Doctor
        working-directory: ${{ inputs.working-directory }}
        # Point tfctl to the downloaded central policies
        run: tfctl doctor --policy-path $GITHUB_WORKSPACE/_central_policies/policies

      - name: Checkov IaC Security Scan
        uses: bridgecrewio/checkov-action@63b8dc5e5afe7c6eb5a0dcaf2a85d07e1e1e2e54 # v12
        with:
          directory: ${{ inputs.working-directory }}
          soft_fail: false
          output_format: cli
          download_external_modules: false
