name: "Reusable TFCTL Plan"

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      GH_PAT:
        required: true
      AWS_ROLE_ARN:
        required: true
    outputs:
      plan_sha256:
        description: "SHA256 digest of the plan artifact for SLSA provenance"
        value: ${{ jobs.plan.outputs.plan_sha256 }}

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      plan_sha256: ${{ steps.sha.outputs.plan_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@6795889618d79d99229f756707265940b9c929a0 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Tools (Python/TF)
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Install Tfctl
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pip install --upgrade pip
          pip install "git+https://${GH_TOKEN}@github.com/rhyscraig/tfctl.git@v2.2.0"

      - name: Run TFCTL Plan
        working-directory: ${{ inputs.working-directory }}
        # TFCTL handles init, workspace selection, and plan generation
        run: tfctl plan --out tfplan.binary

      - name: Compute Plan SHA256
        id: sha
        working-directory: ${{ inputs.working-directory }}
        run: echo "plan_sha256=$(sha256sum tfplan.binary | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ inputs.working-directory }}/tfplan.binary
          retention-days: 1
